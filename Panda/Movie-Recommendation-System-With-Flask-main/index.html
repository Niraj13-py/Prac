<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Recommendation</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(to right, #2c3e50, #3498db);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      font-weight: bold;
    }

    label {
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
    }

    .btn-primary {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 1.1rem;
      background-color: #1abc9c;
      border: none;
    }

    .btn-primary:hover {
      background-color: #16a085;
    }

    @media (max-width: 576px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🎬 Movie Recommendation</h1>
    <form action="/recommend" method="post">
      <div class="form-group text-left">
        <label for="movie_title">Enter a movie title:</label>
        <input type="text" name="movie_title" id="movie_title" class="form-control" placeholder="e.g. Inception" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Get Recommendations</button>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
